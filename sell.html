<h2>Sell Your Item</h2>

<form id="sellForm">

  <input type="text" id="fname" placeholder="First Name" required>
  <input type="text" id="lname" placeholder="Last Name" required>
  <input type="text" id="uni" placeholder="University" required>
  <input type="number" id="price" placeholder="Price (DT)" required>

  <select id="type">
    <option>Book</option>
    <option>Revision Book</option>
    <option>Résumé</option>
    <option>Other</option>
  </select>

  <input type="file" id="image" accept="image/*">

<button onclick="postItem()">Post</button>
</form>

<script src="script.js"></script>
</body>
